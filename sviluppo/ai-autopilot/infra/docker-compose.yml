version: "3.9"

# AdOff AI Autopilot — Stack n8n su Oracle Cloud Free Tier
# Deploy target: VM ARM A1.Flex 4 OCPU 24 GB Frankfurt
# Ubuntu 22.04 ARM
#
# Servizi:
#   - postgres: database n8n (workflow + execution data)
#   - redis: queue Bull (multi-runner support)
#   - n8n: workflow orchestrator
#   - caddy: reverse proxy + auto Let's Encrypt TLS
#   - cloudflared: Cloudflare Tunnel (alternativa a esposizione Caddy diretta)
#
# Setup .env prima di avviare:
#   POSTGRES_PASSWORD=<random 32 char>
#   N8N_ENCRYPTION_KEY=<random 32 char>
#   N8N_HOST=n8n.adoff.app  (o subdomain scelto)
#   N8N_BASIC_AUTH_USER=admin
#   N8N_BASIC_AUTH_PASSWORD=<random 24 char>
#   CLOUDFLARE_TUNNEL_TOKEN=<from Cloudflare Zero Trust dashboard>
#
# Avvio:
#   docker compose up -d
#
# Backup volume Postgres:
#   docker compose exec postgres pg_dump -U n8n n8n > backup-$(date +%Y%m%d).sql

services:

  postgres:
    image: postgres:16-alpine
    container_name: adoff-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: n8n
      POSTGRES_NON_ROOT_USER: n8n_app
      POSTGRES_NON_ROOT_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "n8n", "-d", "n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adoff-internal

  redis:
    image: redis:7-alpine
    container_name: adoff-n8n-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adoff-internal

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: adoff-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_HOST}/
      - N8N_EDITOR_BASE_URL=https://${N8N_HOST}/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_USER_MANAGEMENT_DISABLED=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=true
      - N8N_LOG_LEVEL=info
      - GENERIC_TIMEZONE=Europe/Rome
      - TZ=Europe/Rome
      # Tailscale per chiamare leobox LiteLLM
      # n8n vede leobox come http://leobox:4000 (resolved da Tailscale MagicDNS)
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-files:/files  # workflow JSON exports + custom files
    ports:
      - "127.0.0.1:5678:5678"  # solo localhost, esposto via Caddy/cloudflared
    networks:
      - adoff-internal

  # Worker n8n separato (opzionale, per scaling future quando workflow > 100/min)
  # n8n-worker:
  #   image: docker.n8n.io/n8nio/n8n:latest
  #   container_name: adoff-n8n-worker
  #   restart: unless-stopped
  #   command: worker
  #   depends_on:
  #     - n8n
  #   environment: [stesse env n8n]
  #   networks: [adoff-internal]

  caddy:
    image: caddy:2-alpine
    container_name: adoff-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n
    networks:
      - adoff-internal
    # NOTA: se usi Cloudflare Tunnel (cloudflared), commentare questo servizio
    # Caddy serve solo se vuoi esposizione diretta DNS → IP Oracle pubblico

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: adoff-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - n8n
    networks:
      - adoff-internal
    # Cloudflare Tunnel route configurata via dashboard Zero Trust:
    #   n8n.adoff.app → http://n8n:5678
    # Vantaggio vs Caddy: no IP pubblico esposto, Access MFA built-in

volumes:
  postgres_data:
    name: adoff-n8n-postgres-data
  redis_data:
    name: adoff-n8n-redis-data
  n8n_data:
    name: adoff-n8n-data
  caddy_data:
    name: adoff-caddy-data
  caddy_config:
    name: adoff-caddy-config

networks:
  adoff-internal:
    name: adoff-internal
    driver: bridge

brand: adoff
nome: "AdOff"
settore: "Browser extension / ad blocker / privacy"
mission: "Ad blocker universale con stealth anti-detection, invisibile ai muri anti-adblock. Privacy-first, zero tracking."
tagline:
  it: "Pubblicità? Spenta."
  en: "Ads? Off."
domain: adoff.app
target:
  icp: "Utenti privacy-conscious e tech-savvy stanchi di pubblicità invasive e tracking; chi usa piattaforme video bloccate dai muri anti-adblock."
  pain: "Gli ad blocker comuni vengono rilevati in pochi secondi dai muri anti-adblock; tracking pervasivo; ad video impossibili da togliere."
  desideri: "Navigazione pulita e veloce, privacy reale (zero raccolta dati), blocco invisibile che non viene rilevato."
  personas:
    - { id: privacy_advocate, peso: 0.30, tono: "serio, fact-driven", canali: [mastodon, twitter, reddit] }
    - { id: tech_geek, peso: 0.25, tono: "casual, tecnico, nerd", canali: [twitter, reddit] }
voce:
  tono: [confident, direct, privacy-first, minimal, no-fluff, results-focused]
  persona: "noi (team) per il prodotto, tu (diretto) per l'utente; umorismo dry e sottile, mai cringe"
  do: ["frasi corte, un'idea per frase", "dettagli tecnici concreti (MV3, declarativeNetRequest)", "value-first", "1-2 emoji max (🛡️ ✅ ❌ ⚡ 🔒)"]
  dont: ["pushy", "iperbolico", "tech-bro", "fear-mongering", "salesy"]
  lingua: it
  never_say: ["100% ad-free", "guarantee", "best in the world", "kill ads", "destroy advertisers"]
  claims_safe: ["blocca 130+ ad network", "stealth anti-detection", "Chrome/Firefox/Safari/Edge/Opera", "30 giorni Pro gratis", "zero raccolta dati", "ferma gli ad video invisibile ai muri anti-adblock"]
visual:
  palette: ["#0a0a1a", "#7c5cfc", "#ffffff", "#12122a", "#b8a9ff", "#4ade80", "#f43f5e"]
  nomi_colori:
    deep_space: "#0a0a1a"
    shield_purple: "#7c5cfc"
    pure_white: "#ffffff"
    midnight_blue: "#12122a"
    soft_purple: "#b8a9ff"
    success_green: "#4ade80"
    alert_red: "#f43f5e"
  gradient: "linear-gradient(135deg, #7c5cfc 0%, #4c3ad4 100%)"
  font:
    titolo: "Inter"
    corpo: "Inter"
    mono: "JetBrains Mono"
  stile: "minimal, dark, tech, privacy; scudo come simbolo; spazio profondo + viola elettrico"
canali:
  - { piattaforma: twitter, formati: [post, thread], max_char: 280, hashtag_max: 2 }
  - { piattaforma: mastodon, formati: [post, thread], max_char: 500, hashtag_max: 3 }
  - { piattaforma: reddit, formati: [post], regola: "value-first, mai promozionale, no brand in apertura" }
  - { piattaforma: bluesky, formati: [post] }
  - { piattaforma: instagram, formati: [reel, carosello], note: "canale nuovo da test omnia" }
  - { piattaforma: tiktok, formati: [reel], note: "canale nuovo da test omnia" }
hashtag_core: ["#privacy", "#adblock", "#adblocker", "#zerotracking", "#fediverse"]
hashtag:
  # ── EN: SEMPRE presente, in OGNI post di QUALSIASI lingua ──────────────────
  sempre_en:
    fissi: ["#AdOff", "#adblock", "#privacy"]          # identità brand (priorità 1)
    nicchia: ["#adblocker", "#adblocking", "#zerotracking", "#adfree", "#blockads",
              "#noads", "#stopads", "#nomoreads", "#onlineprivacy", "#internetprivacy",
              "#digitalprivacy", "#dataprivacy", "#privacyfirst", "#privacymatters",
              "#antitracking", "#stoptracking", "#trackerblocker", "#adblockbrowser",
              "#browserextension", "#cleanbrowsing", "#securebrowsing", "#streaming",
              "#cybersecurity", "#onlinesecurity"]
    tech_reach: ["#TechTok", "#TechTips", "#TechNews", "#technology", "#tech",
                 "#gadgets", "#computer", "#computers", "#pc", "#computertips",
                 "#techhacks", "#lifehacks", "#howto", "#tutorial", "#techreview",
                 "#AI", "#software", "#digital", "#innovation", "#techie", "#geek",
                 "#computerscience", "#coding", "#programming"]   # alta diffusione
  # ── per-lingua: aggiunti SOLO se il post è in quella lingua (≈50% del post) ─
  per_lingua:
    en: ["#privacymatters", "#onlinesecurity", "#browsing", "#adfreelife", "#noads",
         "#stopads", "#cleanweb", "#privacytips", "#adblocking", "#techtips"]
    it: ["#pubblicità", "#bloccapubblicità", "#navigazionepulita", "#privacyonline",
         "#consiglitech", "#stoppubblicità", "#nientepubblicità", "#sicurezzaonline",
         "#tecnologia", "#privacydigitale"]
    es: ["#publicidad", "#bloqueardeanuncios", "#sinpublicidad", "#privacidad",
         "#tecnología", "#seguridadonline", "#adiospublicidad", "#navegaciónsegura",
         "#trucostech", "#bloqueadordeanuncios"]
    fr: ["#publicité", "#bloqueurdepub", "#sanspub", "#confidentialité", "#technologie",
         "#sécuritéenligne", "#vieprivée", "#navigationprivée", "#astucestech", "#stoppub"]
    de: ["#werbung", "#werbeblocker", "#keinewerbung", "#datenschutz", "#technik",
         "#onlinesicherheit", "#privatsphäre", "#werbefrei", "#techtipps", "#sicherheit"]
    pt: ["#publicidade", "#bloqueadordeanúncios", "#sempublicidade", "#privacidade",
         "#tecnologia", "#segurançaonline", "#adeuspublicidade", "#navegaçãolimpa",
         "#dicastech", "#semanúncios"]
    nl: ["#reclame", "#adblokker", "#privacy", "#technologie", "#onlineveiligheid",
         "#reclamevrij", "#techtips", "#gegevensbescherming"]
    pl: ["#reklama", "#blokowaniereklam", "#prywatność", "#technologia",
         "#bezpieczeństwo", "#bezreklam", "#techtips", "#ochronaprywatności"]
  fediverse: ["#fediverse"]   # solo Mastodon
  # POOL TREND: aggiornato settimanalmente da refresh_trends.py (NON editare a mano)
  trending: []
  trending_updated: null
  # quanti hashtag per piattaforma (best practice 2026: più ≠ meglio)
  per_platform:           # best-practice 2026 per-piattaforma + rotazione tra i tipi
    instagram: 5
    tiktok: 5
    linkedin: 5
    mastodon: 4
    bluesky: 4
    youtube: 3
    twitter: 2
    facebook: 2
    reddit: 0     # Reddit non usa hashtag (value-first)
  # ricetta (priorità): fissi_en → 1 per_lingua[lang] → 1 tech_reach → riempi con nicchia_en, cap al limite piattaforma. EN sempre garantito (fissi vengono per primi).
  composizione: "fissi_en + 1 lingua-post + 1 tech-reach + nicchia_en, fino al limite piattaforma"
cta_default: "Scaricalo e attivalo gratuitamente — adoff.app"
cta_ads_rule: "Nelle PUBBLICITÀ usa SEMPRE e SOLO 'Scaricalo e attivalo gratuitamente'. MAI citare '30 giorni Pro gratis / senza carta / trial' nelle ad creative."
bridge:
  type: n8n
  schema: adoff_autopilot
  pg_container: n8n-postgres
  pg_db: n8n
  local_files: /opt/n8n/local-files
  container_path: /files
  public_base: "https://leobox.tail78d233.ts.net/omnia-media"  # URL pubblico (Funnel→shim:4080) per IG/TikTok/FB
links:
  sito: "https://adoff.app"
  install: "https://adoff.app/install"   # auto-detect browser
  chrome: "https://chromewebstore.google.com/detail/fcjfpfhdcpbjmihiikbblcokmjnhedhp"
  edge: "https://microsoftedge.microsoft.com/addons/detail/oddekkkjecbnogahoielolemebjlmclk"
  firefox: "https://addons.mozilla.org/firefox/addon/adoff/"
links_footer_rule: |
  In fondo a OGNI post aggiungere i link.
  - Piattaforme con link cliccabili (Facebook/LinkedIn/Twitter/forum/YouTube descr.): metti adoff.app + store diretti.
  - IG/TikTok (link non cliccabili nel testo): 'Link in bio 👉 adoff.app' (i link store vanno in bio/linktree).
asset_dir: assets/
note: |
  Brand importato 2026-05-25 da ~/sdcpp/brands/adoff.json (v1.0.0).
  Mai citare nomi competitor (uBlock/AdBlock Plus/Ghostery) -> usa "altri ad blocker".
  Mai citare nomi piattaforme dirette in claim -> "piattaforme video", "social network".
  Pricing: piano unico. Trial 30gg. 2.99/mese; 19.99/anno (Founder, primi 100; poi 24.99); 99 lifetime Founder.
  Origine test E2E omnia-studio-ai; obiettivo: sostituire l'infra SMM AdOff esistente.

# ── Policy di pubblicazione (cadenza) — letta da tools/publish/schedule.py ──
pubblicazione:
  max_per_giorno: 3              # max 3 post al giorno per cliente
  gap_minuti_min: 90            # orari diversi: almeno 90 min tra un post e l'altro
  lingue_rotazione: [it, en, es, fr, de, pt]   # rotazione lingua per-post (a giro)

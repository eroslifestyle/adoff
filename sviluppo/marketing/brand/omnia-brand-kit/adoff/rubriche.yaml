brand: adoff
updated: 2026-05-25
# 4 rubriche ricorrenti riconoscibili (format fissi che tornano ogni settimana).
# Tutte rispettano messaging/brand-guard di strategy.yaml: no trial, no competitor,
# no loghi/piattaforme reali, audience = cliente finale heavy-streamer.

rubriche:
  - id: lo-sapevi
    nome: "Lo sapevi?"
    obiettivo: educare/awareness
    format: [foto, carosello, reel]
    pillar: [3, 5]
    struttura:
      cover: "LO SAPEVI? + dato shock (es. 'Guardi ~X minuti di pub al mese sullo streaming')"
      corpo: "1 statistica/curiosità su pub/streaming, una riga di contesto"
      chiusura: "AdOff le toglie tutte. adoff.app"
    visual: "fondo deep-space, numero gigante viola, layout fisso 'Lo sapevi? #N'"
    cadenza: "1-2/sett"
    note: "serie numerata (#1, #2...) per riconoscibilità"

  - id: before-after
    nome: "Before / After streaming"
    obiettivo: awareness/convert
    format: [reel]
    pillar: [1, 3]
    struttura:
      before: "stesso video/streaming INVASO dalla pub (rosso, fastidio)"
      after: "stesso contenuto PULITO con AdOff (viola, fluido)"
      cta: "Scaricalo e attivalo gratuitamente"
    visual: "split o transizione netta before(rosso)→after(viola); demo reale dove possibile"
    cadenza: "1-2/sett"

  - id: mito-vs-realta
    nome: "Mito vs Realtà"
    obiettivo: educare/consideration
    format: [carosello, reel]
    pillar: [2, 3, 4]
    struttura:
      mito: "❌ credenza comune (es. 'i blocca-pub rallentano il browser')"
      realta: "✅ verità (es. 'AdOff rende lo streaming più fluido, non più lento')"
    visual: "due blocchi ❌rosso / ✅verde, layout fisso"
    cadenza: "1/sett"
    esempi_mito:
      - "I blocca-pub vengono sempre rilevati → AdOff resta invisibile"
      - "Bloccare le pub rallenta i video → al contrario, streaming più veloce"
      - "Serve essere tecnici per usarli → si scarica e attiva in un clic"

  - id: demo-live
    nome: "Demo live dell'estensione"
    obiettivo: convert/proof
    format: [reel, story]
    pillar: [1, 4]
    struttura:
      hook: "una pub parte sullo streaming…"
      azione: "AdOff la blocca/salta IN DIRETTA (screen recording reale)"
      cta: "Scaricalo e attivalo gratuitamente"
    visual: "screen-recording reale estensione (via playwright capture); end-card brand"
    cadenza: "1/sett (richiede asset demo reale)"

elementi_comuni:   # dal visual-kit
  sigla: "logo AdOff 0,5-1s in apertura"
  end_card: "Scaricalo e attivalo gratuitamente — adoff.app"
  karaoke: "sottotitoli word-by-word sempre"
  colore_accento: { problema: "#f43f5e", brand: "#7c5cfc", privacy: "#4ade80" }

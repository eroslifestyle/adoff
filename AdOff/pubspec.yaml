name: adoff
description: "AdOff — Ad blocking for Android via local VPN"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # License
  shared_preferences: ^2.2.0
  http: ^1.1.0
  # i18n
  intl: ^0.20.2
  # Utils
  path_provider: ^2.1.0
  # Note: firebase_crashlytics requires google-services.json from Firebase Console
  # Add when Firebase project is configured: firebase_crashlytics, firebase_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
